name: tests

on:
  pull_request:
    branches: ['*']
  # Restrict `push` to maintainer-curated refs. Feature branches with an open
  # PR fire `pull_request` instead, so this avoids the duplicate run while
  # still gating direct merges to `master` / release branches and giving
  # fork PRs (which only surface as `pull_request` events upstream) full CI.
  push:
    branches:
      - master
      - 'release/**'
  schedule:
    # Nightly cron, 04:00 UTC.
    - cron: '0 4 * * *'
  workflow_dispatch:

# Cancel in-progress runs of this workflow when a newer commit lands on the
# same ref. The group is keyed off `github.workflow` and `github.ref`, so
# rapid-fire pushes (or a `push` and `pull_request` event for the same ref)
# coalesce — only the latest run survives. The schedule trigger gets its own
# group via `github.run_id` so a nightly run never cancels itself or a
# concurrent PR run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'schedule' && github.run_id || '' }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Unified test job: unit → grammar → vscode-test-cli → wdio. Ordered fast-to-slow
  # so failures surface quickly. Shares the VS Code/elan caches across stages.
  test:
    # Runs on every supported trigger. On `schedule` / `workflow_dispatch`
    # this fires alongside `network` so the daily cron exercises the regular
    # suite too — catching regressions (dependency drift, runner-image
    # changes) that the network subset alone wouldn't surface.
    #
    # `fail-fast: false` so a Windows-only failure doesn't cancel the
    # Linux matrix cell (and vice versa); we want both badges either way.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # Outer safety net: a wedged `execFileSync` (lake / elan / git) blocks the
    # Node event loop synchronously, so mocha's per-test timer never fires and
    # the job sits at GitHub's default 360-minute limit. Cap well below that.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - uses: ./.github/actions/cache-vscode

      # Resolve `leanprover/lean4:stable` to a concrete version so the elan
      # cache key rotates exactly when Lean publishes a new stable release.
      # Elan eagerly re-resolves `:stable` on every invocation and downloads
      # the new toolchain itself — so freshness isn't the concern, the cache
      # is. `actions/cache@v4` only writes back when the primary key didn't
      # already exist; if we kept the same key forever, every run after a
      # new stable shipped would hit the stale cache, re-download the new
      # toolchain, and never write the result back. Keying on the resolved
      # version produces a one-time miss per stable release: `restore-keys`
      # falls back to the previous cache (so we keep the unchanged extension
      # install, etc.), elan adds the new toolchain, and the run saves a
      # fresh cache under the new key. `release.lean-lang.org` returns
      # `{ stable: [{ name, … }, …] }` with the most recent stable first.
      - name: Resolve Lean stable version
        id: lean
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const r = await fetch('https://release.lean-lang.org/')
            if (!r.ok) throw new Error(`failed to fetch lean release index: ${r.status}`)
            const data = await r.json()
            const stable = data?.stable?.[0]?.name
            if (!stable) throw new Error(`no stable release found in lean release index: ${JSON.stringify(data).slice(0, 200)}`)
            core.setOutput('version', stable)

      - name: Cache elan + toolchains
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.lean4-test-home/.elan
          key: elan-${{ runner.os }}-${{ steps.lean.outputs.version }}
          restore-keys: |
            elan-${{ runner.os }}-

      - uses: ./.github/actions/setup-elan
        with:
          channel: leanprover/lean4:stable

      - run: npm ci

      # Build dev variants of every workspace topologically (lerna). Two
      # consumers force `:dev`:
      #   - vscode-lean4's `pretest:*` chain runs `build:dev` (webpack
      #     `--env development`), which imports `@leanprover/infoview/loader`
      #     and resolves it to `dist/loader.development.js`. The plain
      #     `build` only emits `*.production.min.js`.
      #   - The infoview's tsc-based `npm test` resolves
      #     `@leanprover/infoview-api` via its `package.json`'s
      #     `"types": "dist/index"`; both `build` and `build:dev` produce
      #     the .d.ts, so `:dev` covers it too.
      # `npm ci` doesn't build workspaces, so on a fresh CI runner there is
      # nothing in `dist/` until this step runs. (vscode-lean4 gets rebuilt
      # later by its own `pretest:*` hook — harmless.)
      - run: npm run build:dev

      - name: Run all tests
        env:
          LEAN4_TEST_HOME_OVERRIDE: ${{ github.workspace }}/.lean4-test-home
        # Go through the `test:headless` script (defined in `package.json`)
        # rather than calling `xvfb-run` inline, so flags / wrapper changes
        # made for local dev automatically apply to CI too.
        run: npm run test:headless

      # `if: failure()` skips on green runs (zero cost) and packages the
      # test framework's failure dumps on red ones: per-test JSON state from
      # `helpers/teardown.ts:dumpStateIfFailed`, wdio screenshots, and the
      # extension-host / renderer logs. Available as a downloadable zip in
      # the workflow run UI.
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-test-${{ matrix.os }}
          path: |
            vscode-lean4/vscode-test-cli-output/
            vscode-lean4/wdio-output/
          if-no-files-found: ignore

  # Variant of the `test` job that runs the same suite against
  # `leanprover/lean4:nightly` instead of `:stable`. Surfaces upstream
  # regressions (Lean elaboration / LSP / lake changes) before they reach a
  # stable release. Gated behind the nightly schedule + manual dispatch
  # because Lean nightly breaks legitimately often and we don't want flakes
  # blocking PR CI.
  test-nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - uses: ./.github/actions/cache-vscode

      # `:nightly` rotates daily, so keying the elan cache on a resolved
      # version (as the `test` job does for `:stable`) would miss every
      # single run. Keying on the UTC date instead means: yesterday's cache
      # is restored via `restore-keys` (so we keep elan + the previous
      # nightly toolchain), today's `elan toolchain install` adds the new
      # nightly on top, and the run saves a fresh cache under today's key.
      # GitHub Actions evicts old entries via LRU, so we don't manage growth.
      - name: Resolve today's date (UTC)
        id: date
        run: echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Cache elan + toolchains
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.lean4-test-home/.elan
          key: elan-${{ runner.os }}-nightly-${{ steps.date.outputs.today }}
          restore-keys: |
            elan-${{ runner.os }}-nightly-

      # `default: true` flips elan's default to `:nightly` so detached /
      # untitled-file tests (which use the configured default rather than a
      # `lean-toolchain` file) exercise nightly too.
      - uses: ./.github/actions/setup-elan
        with:
          channel: leanprover/lean4:nightly
          default: 'true'

      # Rewrite every fixture's `lean-toolchain` from `:stable` to `:nightly`.
      # The anchored sed pattern only touches files whose entire content is
      # `leanprover/lean4:stable`, so the mock-toolchain fixtures
      # (`mock-ancient-lean4-project`, `mock-lean3-project`) are left alone.
      # Keeping the rewrite job-scoped (vs. changing the files in-tree) means
      # PR CI continues to exercise stable. `shell: bash` so Windows runners
      # use Git Bash (which ships GNU find + sed); the default Windows shell
      # is pwsh, which has neither.
      - name: Rewrite fixture toolchains to :nightly
        shell: bash
        run: |
          find vscode-lean4/test/fixtures -name lean-toolchain -exec \
            sed -i 's|^leanprover/lean4:stable$|leanprover/lean4:nightly|' {} +

      - run: npm ci
      # Same rationale as in the `test` job above.
      - run: npm run build:dev

      - name: Run all tests against Lean nightly
        env:
          LEAN4_TEST_HOME_OVERRIDE: ${{ github.workspace }}/.lean4-test-home
        run: npm run test:headless

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-test-nightly-${{ matrix.os }}
          path: |
            vscode-lean4/vscode-test-cli-output/
            vscode-lean4/wdio-output/
          if-no-files-found: ignore

  # The "network" suite — exercises the real elan install flow plus
  # `lake new … math` (Mathlib clone + cache fetch). Gated behind the
  # nightly schedule (or manual dispatch) because it hits the network
  # hard and adds several minutes. Runs on both Linux and Windows
  # because elan's Windows installer is a different code path from the
  # POSIX one and we want coverage of both.
  network:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # Higher than `test`: this job runs `lake new … math`, which clones
    # Mathlib and fetches its build cache, plus the toolchain-update /
    # elan-install flows. Realistic upper bound is ~45 min on a slow
    # runner; 90 leaves margin without letting a wedged shellout sit for 6h.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - uses: ./.github/actions/cache-vscode

      - run: npm ci
      # Same rationale as in the `test` job above.
      - run: npm run build:dev
      - name: Run network tests
        # Same rationale as the `test` job: route through the headless
        # script so CI tracks local.
        run: npm run test:headless:network --workspace=lean4

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-network-${{ matrix.os }}
          path: |
            vscode-lean4/vscode-test-cli-output/
            vscode-lean4/wdio-output/
          if-no-files-found: ignore
